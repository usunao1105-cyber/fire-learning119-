<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCF Calculator & CPR Log</title>
    
    <!-- PWA用設定の読み込み (./ を追加して確実に読み込ませる) -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ライブラリの読み込み設定 (Import Map) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    
    <!-- Babel (JSXをブラウザで実行するための変換ツール) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .animate-in {
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overscroll-none">
    <div id="root"></div>

    <!-- PWA用 Service Worker の登録 (./ を追加して確実に読み込ませる) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>

    <!-- アプリケーションロジック -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Play, Pause, RotateCcw, Activity, Clock, Heart, 
            Volume2, VolumeX, Download, Copy, FileText, 
            Zap, Syringe, ClipboardList, Stethoscope, X, Check,
            User, Users
        } from 'lucide-react';

        function App() {
            // State for timers and status
            const [isActive, setIsActive] = useState(false);
            const [isCompressing, setIsCompressing] = useState(false);
            const [totalTime, setTotalTime] = useState(0);
            const [compressionTime, setCompressionTime] = useState(0);
            const [logs, setLogs] = useState([]);
            
            // Session Info
            const [evaluator, setEvaluator] = useState('');
            const [student, setStudent] = useState('');
            
            // UI States
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [notification, setNotification] = useState(null);

            // Metronome state
            const [metronomeEnabled, setMetronomeEnabled] = useState(false);
            const [metronomeTick, setMetronomeTick] = useState(false);
            const bpm = 110;
            
            const timerRef = useRef(null);
            const metronomeRef = useRef(null);
            const notificationTimeoutRef = useRef(null);

            const playMetronomeBeep = useCallback(() => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.1;
                
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            }, []);

            const playCatMeow = useCallback(() => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'triangle'; 
                
                const now = ctx.currentTime;
                const duration = 0.4;

                osc.frequency.setValueAtTime(800, now); 
                osc.frequency.linearRampToValueAtTime(1200, now + 0.1); 
                osc.frequency.linearRampToValueAtTime(600, now + duration);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.start(now);
                osc.stop(now + duration + 0.1);
            }, []);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                if (notificationTimeoutRef.current) clearTimeout(notificationTimeoutRef.current);
                notificationTimeoutRef.current = setTimeout(() => {
                setNotification(null);
                }, 3000);
            };

            useEffect(() => {
                if (isActive) {
                timerRef.current = setInterval(() => {
                    setTotalTime(prev => prev + 100);
                    if (isCompressing) {
                    setCompressionTime(prev => prev + 100);
                    }
                }, 100);
                } else {
                clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isActive, isCompressing]);

            useEffect(() => {
                if (isActive && isCompressing && metronomeEnabled) {
                const intervalMs = (60 / bpm) * 1000;
                metronomeRef.current = setInterval(() => {
                    setMetronomeTick(prev => !prev);
                    playMetronomeBeep();
                }, intervalMs);
                } else {
                clearInterval(metronomeRef.current);
                setMetronomeTick(false);
                }
                return () => clearInterval(metronomeRef.current);
            }, [isActive, isCompressing, metronomeEnabled, playMetronomeBeep]);

            const formatTime = (ms) => {
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            };

            const ccf = totalTime > 0 ? Math.round((compressionTime / totalTime) * 100) : 0;

            const addLog = (message) => {
                const timestamp = new Date().toLocaleTimeString();
                const elapsed = formatTime(totalTime); 
                setLogs(prev => [{ time: timestamp, elapsed, message }, ...prev]);
            };

            const toggleSession = () => {
                if (!isActive) {
                    setIsActive(true);
                    setIsCompressing(true);

                    if (totalTime === 0) {
                        addLog("蘇生活動開始 (Code Blue Start)");
                        addLog("圧迫開始 (Compressions Started)");
                    } else {
                        addLog("蘇生活動再開 (Resumed)");
                        addLog("圧迫再開 (Compressions Started)");
                    }
                    playCatMeow();
                } else {
                    setIsActive(false);
                    setIsCompressing(false);
                    addLog("蘇生活動中断 (Paused)");
                    playCatMeow();
                }
            };

            const toggleCompression = () => {
                if (!isActive) return;
                
                if (isCompressing) {
                setIsCompressing(false);
                addLog("圧迫中断 (Paused)");
                } else {
                setIsCompressing(true);
                addLog("圧迫再開 (Compressions Started)");
                }
            };

            const requestReset = () => {
                setShowResetConfirm(true);
            };

            const executeReset = () => {
                setIsActive(false);
                setIsCompressing(false);
                setTotalTime(0);
                setCompressionTime(0);
                setLogs([]);
                setShowResetConfirm(false);
                showNotification("リセットしました");
            };

            const handleAction = (actionName) => {
                addLog(actionName);
                playCatMeow();
            };

            const generateLogText = () => {
                const header = [
                    "--------------------------------",
                    `評価日時: ${new Date().toLocaleString()}`,
                    `評価者: ${evaluator || "(未入力)"}`,
                    `受講生: ${student || "(未入力)"}`,
                    `CCF (胸骨圧迫実施率): ${ccf}%`,
                    `総活動時間: ${formatTime(totalTime)}`,
                    "--------------------------------",
                    ""
                ].join('\n');

                const body = logs.map(l => `[${l.time}] (経過: ${l.elapsed}) ${l.message}`).join('\n');
                return header + body;
            };

            const copyLogsToClipboard = () => {
                const logText = generateLogText();
                const textArea = document.createElement("textarea");
                textArea.value = logText;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showNotification("ログをクリップボードにコピーしました");
                } else {
                    showNotification("コピーに失敗しました", 'error');
                }
                } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
                showNotification("コピー中にエラーが発生しました", 'error');
                }
                document.body.removeChild(textArea);
            };

            const downloadLogs = () => {
                const logText = generateLogText();
                const blob = new Blob([logText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CPR_Log_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showNotification("ログファイルをダウンロードしました");
            };

            const getCcfColor = () => {
                if (totalTime < 10000) return "text-gray-600";
                if (ccf >= 80) return "text-green-600";
                if (ccf >= 60) return "text-yellow-600";
                return "text-red-600";
            };

            const actionGroups = [
                {
                title: "Rhythm & Defib",
                color: "bg-red-50 border-red-200 text-red-700",
                items: ["Shock", "VF", "Pulseless VT", "PEA", "Asystole"]
                },
                {
                title: "Assessment",
                color: "bg-blue-50 border-blue-200 text-blue-700",
                items: ["Primary Assess", "Secondary Assess", "Quality of CPR"]
                },
                {
                title: "Intervention",
                color: "bg-green-50 border-green-200 text-green-700",
                items: ["IV Route", "Adrenaline", "Anti Arrhythmic", "Advanced Airway"]
                }
            ];

            return (
                <div className="min-h-screen bg-slate-50 p-2 md:p-4 font-sans text-slate-900 max-w-3xl mx-auto shadow-xl relative">
                
                {notification && (
                    <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg z-50 transition-all ${
                    notification.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'
                    }`}>
                    {notification.message}
                    </div>
                )}

                {showResetConfirm && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full animate-in">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">リセット確認</h3>
                        <p className="text-slate-600 mb-6">タイマーと記録されたログがすべて消去されます。本当によろしいですか？</p>
                        <div className="flex gap-3">
                        <button 
                            onClick={() => setShowResetConfirm(false)}
                            className="flex-1 py-3 bg-slate-100 text-slate-700 rounded-lg font-bold hover:bg-slate-200"
                        >
                            キャンセル
                        </button>
                        <button 
                            onClick={executeReset}
                            className="flex-1 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 flex items-center justify-center gap-2"
                        >
                            <RotateCcw size={18} />
                            リセットする
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                <header className="mb-4 bg-white p-4 rounded-xl shadow-sm border-b">
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2 text-slate-800">
                                <Activity className="text-red-600" />
                                CCF Calculator
                            </h1>
                            <p className="text-xs text-slate-500">胸骨圧迫実施率 & 活動記録</p>
                        </div>
                        <button 
                            onClick={() => setMetronomeEnabled(!metronomeEnabled)}
                            className={`p-2 rounded-full transition-colors ${metronomeEnabled ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-400'}`}
                            title="メトロノーム (110bpm)"
                        >
                            {metronomeEnabled ? <Volume2 size={24} /> : <VolumeX size={24} />}
                        </button>
                    </div>

                    <div className="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                        <div>
                            <label className="flex items-center gap-1 text-xs font-bold text-slate-500 mb-1">
                                <User size={12} /> 評価者 (Evaluator)
                            </label>
                            <input 
                                type="text" 
                                value={evaluator} 
                                onChange={(e) => setEvaluator(e.target.value)}
                                className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                                placeholder="名前を入力"
                            />
                        </div>
                        <div>
                            <label className="flex items-center gap-1 text-xs font-bold text-slate-500 mb-1">
                                <Users size={12} /> 受講生 (Student)
                            </label>
                            <input 
                                type="text" 
                                value={student} 
                                onChange={(e) => setStudent(e.target.value)}
                                className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                                placeholder="名前を入力"
                            />
                        </div>
                    </div>
                </header>

                <div className="grid grid-cols-2 gap-2 md:gap-4 mb-4">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                    <div className="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1 flex items-center gap-1">
                        <Clock size={12} /> 経過時間
                    </div>
                    <div className="text-3xl font-mono font-bold text-slate-800">
                        {formatTime(totalTime)}
                    </div>
                    </div>

                    <div className={`p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center justify-center transition-colors ${isCompressing ? 'bg-red-50 border-red-200' : 'bg-white'}`}>
                    <div className="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1 flex items-center gap-1">
                        <Heart size={12} /> 圧迫時間
                    </div>
                    <div className={`text-3xl font-mono font-bold ${isCompressing ? 'text-red-600' : 'text-slate-800'}`}>
                        {formatTime(compressionTime)}
                    </div>
                    </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6 text-center relative overflow-hidden">
                    {isCompressing && metronomeEnabled && (
                    <div className={`absolute top-2 right-2 w-4 h-4 rounded-full ${metronomeTick ? 'bg-red-500' : 'bg-red-200'}`} />
                    )}
                    <div className="flex justify-between items-end mb-2 px-4">
                    <h2 className="text-slate-400 text-sm font-bold uppercase tracking-widest">CCF (実施率)</h2>
                    <span className={`text-4xl font-black ${getCcfColor()}`}>{ccf}%</span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-2.5">
                    <div 
                        className={`h-2.5 rounded-full transition-all duration-300 ${ccf >= 80 ? 'bg-green-500' : ccf >= 60 ? 'bg-yellow-400' : 'bg-red-500'}`} 
                        style={{ width: `${ccf}%` }}
                    ></div>
                    </div>
                </div>

                <div className="mb-6">
                    {!isActive ? (
                    <div className="space-y-3">
                        <button 
                        onClick={toggleSession}
                        className={`w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 ${
                            totalTime > 0 
                            ? "bg-blue-600 hover:bg-blue-500 text-white" 
                            : "bg-slate-800 hover:bg-slate-700 text-white"
                        }`}
                        >
                        <Play fill="currentColor" />
                        {totalTime > 0 ? "蘇生再開 (RESUME)" : "蘇生開始 (START)"}
                        </button>
                        
                        {totalTime > 0 && (
                        <button 
                            onClick={requestReset}
                            className="w-full py-3 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 rounded-xl font-bold flex items-center justify-center gap-2"
                        >
                            <RotateCcw size={18} />
                            リセット
                        </button>
                        )}
                    </div>
                    ) : (
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <button 
                        onClick={toggleCompression}
                        className={`md:col-span-3 py-6 rounded-xl font-bold text-2xl shadow-lg flex flex-col items-center justify-center gap-2 transition-all active:scale-95 border-b-4 ${
                            isCompressing 
                            ? 'bg-red-100 text-red-700 border-red-300 hover:bg-red-200' 
                            : 'bg-red-600 text-white border-red-800 hover:bg-red-500'
                        }`}
                        >
                        <div className="flex items-center gap-3">
                            <Activity size={28} className={isCompressing ? "animate-pulse" : ""} />
                            {isCompressing ? "圧迫中 (STOP)" : "圧迫再開 (PUSH)"}
                        </div>
                        </button>

                        <div className="grid grid-cols-2 md:grid-cols-1 gap-2">
                        <button 
                            onClick={toggleSession}
                            className="py-2 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-lg font-bold flex items-center justify-center gap-1 text-sm"
                        >
                            <Pause size={16} /> 一時停止
                        </button>
                        <button 
                            onClick={requestReset}
                            className="py-2 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 rounded-lg font-bold flex items-center justify-center gap-1 text-sm"
                        >
                            <RotateCcw size={16} /> リセット
                        </button>
                        </div>
                    </div>
                    )}
                </div>

                <div className="mb-6 space-y-3">
                    {actionGroups.map((group, gIndex) => (
                    <div key={gIndex} className="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 ml-1">{group.title}</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                        {group.items.map((item, iIndex) => (
                            <button
                            key={iIndex}
                            onClick={() => handleAction(item)}
                            disabled={!isActive}
                            className={`px-2 py-3 rounded-md text-sm font-bold shadow-sm border transition-transform active:scale-95 flex items-center justify-center text-center
                                ${!isActive ? 'opacity-50 cursor-not-allowed bg-slate-50 text-slate-300' : `hover:brightness-95 ${group.color}`}`}
                            >
                            {item}
                            </button>
                        ))}
                        </div>
                    </div>
                    ))}
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                    <div className="flex justify-between items-center mb-2 border-b pb-2">
                    <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <ClipboardList size={16} /> 活動ログ
                    </h3>
                    <div className="flex gap-2">
                        <button 
                        onClick={copyLogsToClipboard}
                        className="text-slate-500 hover:text-slate-800 p-1 rounded hover:bg-slate-100" 
                        title="クリップボードにコピー"
                        >
                        <Copy size={16} />
                        </button>
                        <button 
                        onClick={downloadLogs}
                        className="text-slate-500 hover:text-slate-800 p-1 rounded hover:bg-slate-100" 
                        title="ファイルとして保存"
                        >
                        <Download size={16} />
                        </button>
                    </div>
                    </div>
                    
                    <div className="h-48 overflow-y-auto bg-slate-50 rounded p-2 text-sm font-mono border border-slate-200">
                    {logs.length === 0 ? (
                        <p className="text-slate-400 italic text-center mt-10">記録待機中...</p>
                    ) : (
                        <ul className="space-y-1">
                        {logs.map((log, index) => (
                            <li key={index} className="flex gap-2 text-slate-700 border-b border-slate-100 pb-1 last:border-0">
                            <span className="text-slate-400 w-16 shrink-0">{log.time}</span>
                            <span className="text-blue-600 w-14 shrink-0 font-bold">[{log.elapsed}]</span>
                            <span>{log.message}</span>
                            </li>
                        ))}
                        </ul>
                    )}
                    </div>
                </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
